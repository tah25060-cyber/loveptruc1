<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Bé❤️ Của Anh - 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
:root{
--bg-color:#1a0105;
--primary-red:#800f2f;
--accent-pink:#ff4d6d;
--text-gold:#ffb3c1;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background-color:var(--bg-color);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Montserrat',sans-serif;
overflow:hidden;
position:relative;
}

#canvas{
position:fixed;
top:0;
left:0;
z-index:1;
pointer-events:none;
}

.card{
position:relative;
width:90%;
max-width:420px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,77,109,0.3);
box-shadow:0 0 50px rgba(128,15,47,0.6);
z-index:10;
text-align:center;
display:flex;
flex-direction:column;
gap:20px;
}

.card::after{
content:'';
position:absolute;
top:-10px;
left:-10px;
right:-10px;
bottom:-10px;
background:radial-gradient(circle,var(--accent-pink),transparent 70%);
border-radius:20px;
z-index:-1;
filter:blur(30px);
opacity:0.2;
}

.img-container{
width:100%;
height:400px;
border-radius:10px;
overflow:hidden;
border:2px solid #fff;
box-shadow:0 0 20px rgba(255,255,255,0.3);
position:relative;
}

.slide-img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
top:0;
left:0;
opacity:0;
transition:opacity 1.5s ease-in-out, transform 2s ease;
}

.slide-img.active{
opacity:1;
transform:scale(1.05);
}

.heart-icon{
position:absolute;
top:-15px;
right:-15px;
font-size:50px;
color:var(--accent-pink);
text-shadow:0 0 15px var(--accent-pink);
animation:beat 1.5s infinite;
z-index:15;
}

@keyframes beat{
0%{transform:scale(1);}
15%{transform:scale(1.2);}
30%{transform:scale(1);}
}

.text-content{
margin-bottom:60px;
min-height:100px;
}

.text-item{
display:none;
animation:fadeIn 1s forwards;
}

.text-item.active{display:block;}

h2{
font-family:'Dancing Script',cursive;
font-size:2.2rem;
color:#fff;
text-shadow:0 0 10px var(--accent-pink);
margin-bottom:10px;
}

p{
color:var(--text-gold);
font-size:0.95rem;
line-height:1.5;
font-weight:500;
font-style:italic;
}

.btn-heart{
position:absolute;
bottom:-35px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
background:#fff;
border:none;
border-radius:50%;
cursor:pointer;
box-shadow:0 5px 20px rgba(128,15,47,0.4);
z-index:25;
font-size:30px;
}

.particle{
position:fixed;
pointer-events:none;
z-index:100;
animation:explode 0.8s forwards;
}

@keyframes explode{
0%{transform:translate(0,0) scale(1);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(0);opacity:0;}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- NHẠC TỰ PHÁT -->
<audio id="bgmusic" autoplay loop muted>
<source src="https://files.catbox.moe/6s6s0g.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<div class="card">

<div class="heart-icon">❤️</div>

<div class="img-container">
<img src="https://i.postimg.cc/QM62kpjJ/z7523866925759-a9049963625408bf7ab4c1a7b205abad.jpg" class="slide-img active">
<img src="https://i.postimg.cc/pTsD72sk/z7523866925669-6a3c035b729eca1fcdbc64013dd41ac3.jpg" class="slide-img">
<img src="https://i.postimg.cc/jdhBq1Mn/z7592243345952-f202de3bbfcc742c32cb158a29b232e0.jpg" class="slide-img">
<img src="https://i.postimg.cc/KY4YDB1H/z7592243346235-6f7eb48b6e8d5ca3d568b7fff3510de6.jpg" class="slide-img">
<img src="https://i.postimg.cc/zf5G46PN/z7592607654707-2215a2537d1ab34def5ae69868be89ef.jpg" class="slide-img">
</div>

<div class="text-content">

<div class="text-item active">
<h2>My Love – Happy 8/3</h2>
<p>"Bé là điều tuyệt vời nhất mà anh có."</p>
</div>

<div class="text-item">
<h2>Bé Là Hạnh Phúc Của Anh❤️</h2>
<p>"Cảm ơn bé vì đã đến bên anh."</p>
</div>

<div class="text-item">
<h2>Nơi Bình Yên Nhất❤️</h2>
<p>"Chỉ mong bé luôn vui vẻ."</p>
</div>

<div class="text-item">
<h2>Mãi Yêu Bé❤️</h2>
<p>"Anh sẽ luôn bên cạnh em."</p>
</div>

<div class="text-item">
<h2>Forever With You❤️</h2>
<p>"Chúng ta sẽ cùng nhau đi thật xa."</p>
</div>

</div>

<button class="btn-heart" onclick="showNext(event)">❤️</button>

</div>

<script>

let index=0;
const imgs=document.querySelectorAll('.slide-img');
const texts=document.querySelectorAll('.text-item');

function showNext(e){

for(let i=0;i<12;i++) createParticle(e.clientX,e.clientY);

imgs[index].classList.remove('active');
texts[index].classList.remove('active');

index=(index+1)%imgs.length;

imgs[index].classList.add('active');
texts[index].classList.add('active');
}

function createParticle(x,y){

const p=document.createElement('div');
p.className='particle';
p.innerHTML=['❤️','✨','💖'][Math.floor(Math.random()*3)];

p.style.left=x+'px';
p.style.top=y+'px';

p.style.setProperty('--x',(Math.random()-0.5)*250+'px');
p.style.setProperty('--y',(Math.random()-0.5)*250+'px');

document.body.appendChild(p);

setTimeout(()=>p.remove(),800);
}

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let hearts=[];

function createHeart(){

return{
x:Math.random()*canvas.width,
y:-10,
size:Math.random()*5+2,
speed:Math.random()*1.5+0.5,
wind:Math.random()*0.5-0.25,
opacity:Math.random()*0.5
};
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle='#ff758f';

hearts.forEach((h,i)=>{

ctx.globalAlpha=h.opacity;

ctx.beginPath();
ctx.arc(h.x,h.y,h.size/2,0,Math.PI*2);
ctx.fill();

h.y+=h.speed;
h.x+=h.wind;

if(h.y>canvas.height) hearts[i]=createHeart();
});

requestAnimationFrame(draw);
}

for(let j=0;j<50;j++) hearts.push(createHeart());

draw();

/* bật âm thanh */
const music=document.getElementById("bgmusic");

window.addEventListener("load",()=>{
music.muted=false;
music.play().catch(()=>{});
});

</script>

</body>
</html>
